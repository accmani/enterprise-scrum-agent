version: "3.9"

services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: enterprise-scrum-agent-backend:latest
    container_name: scrum-agent-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - DATABASE_URL=sqlite+aiosqlite:///./scrum_agent.db
      - CORS_ORIGINS=http://localhost:3000
      - DEBUG=false
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    image: enterprise-scrum-agent-frontend:latest
    container_name: scrum-agent-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
